    <svg id="screen" width="1280" height="765" viewBox="0 0 1280 765" preserveAspectRatio="xMidYMin slice"><rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="1280" class="foreground">                                                                                                                                                                </text></g><g id="g2"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="104" font-weight="bold" fill="#d7875f">&#127859;  enplace  </text><text x="120" textLength="8" font-weight="bold" fill="#af8787">/</text><text x="128" textLength="16" class="foreground">  </text><text x="144" textLength="408" fill="#afaf87">Original NESTL&#201;&#174; TOLL HOUSE&#174; Chocolate Chip Cookies</text><text x="552" textLength="312" class="foreground">                                       </text><text x="864" textLength="88" fill="#af8787">&#128269; / search</text><text x="952" textLength="24" class="foreground">   </text><text x="976" textLength="80" fill="#af8787">&#9881; m manage</text><text x="1056" textLength="24" class="foreground">   </text><text x="1080" textLength="72" fill="#af8787">&#127968; h home</text><text x="1152" textLength="24" class="foreground">   </text><text x="1176" textLength="72" fill="#af8787">&#128682; q quit</text><text x="1248" textLength="32" class="foreground">    </text></g><g id="g3"><text x="0" textLength="1264" fill="#303030">&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text><text x="1264" textLength="16" class="foreground">  </text></g><g id="g4"><text x="0" textLength="408" font-weight="bold" fill="#d7875f">Original NESTL&#201;&#174; TOLL HOUSE&#174; Chocolate Chip Cookies</text><text x="408" textLength="872" class="foreground">                                                                                                             </text></g><g id="g5"><text x="0" textLength="240" fill="#af8787">Cook 11m  &#183;  Serves 60 cookies</text><text x="240" textLength="1040" class="foreground">                                                                                                                                  </text></g><g id="g6"><text x="0" textLength="8" class="foreground"> </text><text x="8" textLength="56" fill="#ffffff">dessert</text><text x="64" textLength="24" class="foreground">   </text><text x="88" textLength="32" fill="#ffffff">bake</text><text x="120" textLength="24" class="foreground">   </text><text x="144" textLength="64" fill="#ffffff">american</text><text x="208" textLength="1072" class="foreground">                                                                                                                                      </text></g><g id="g7"><text x="0" textLength="792" class="background">The classic chocolate chip cookie recipe featuring crispy edges and gooey centers made with NESTL&#201;&#174;</text><text x="792" textLength="488" class="foreground">                                                             </text></g><g id="g8"><text x="0" textLength="784" class="background">TOLL HOUSE&#174; Semi-Sweet Chocolate Morsels. This versatile recipe is easy to prepare and perfect for</text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g9"><text x="0" textLength="104" class="background">any occasion.</text><text x="104" textLength="1176" class="foreground">                                                                                                                                                   </text></g><g id="g10"><text x="0" textLength="88" font-weight="bold" fill="#87af87">Ingredients</text><text x="88" textLength="1192" class="foreground">                                                                                                                                                     </text></g><g id="g11"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">2 1/4 cup all-purpose flour                                                                                                                                 </text></g><g id="g12"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">1 tsp baking soda                                                                                                                                           </text></g><g id="g13"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">1 tsp salt                                                                                                                                                  </text></g><g id="g14"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">1 cup butter, softened                                                                                                                                      </text></g><g id="g15"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">3/4 cup granulated sugar                                                                                                                                    </text></g><g id="g16"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">3/4 cup brown sugar, packed                                                                                                                                 </text></g><g id="g17"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">1 tsp vanilla extract                                                                                                                                       </text></g><g id="g18"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">2 eggs, large                                                                                                                                               </text></g><g id="g19"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">2 cup chocolate morsels, semi-sweet                                                                                                                         </text></g><g id="g20"><text x="0" textLength="32" fill="#af8787">  &#183; </text><text x="32" textLength="1248" class="foreground">1 cup nuts, chopped, optional                                                                                                                               </text></g><g id="g21"><text x="0" textLength="80" font-weight="bold" fill="#87af87">Directions</text><text x="80" textLength="1200" class="foreground">                                                                                                                                                      </text></g><g id="g22"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">                                                                                                </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g23"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">1. Preheat oven to 375&#176;F.                                                                       </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g24"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">2. Combine flour, baking soda, and salt in small bowl.                                          </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g25"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">3. Beat butter, granulated sugar, brown sugar, and vanilla extract in large mixer bowl until    </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g26"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">creamy.                                                                                         </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g27"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">4. Add eggs one at a time, beating well after each addition.                                    </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g28"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">5. Gradually beat in flour mixture.                                                             </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g29"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">6. Stir in chocolate morsels and nuts.                                                          </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g30"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">7. Drop by rounded tablespoon onto ungreased baking sheets.                                     </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g31"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">8. Bake for 9 to 11 minutes or until golden brown.                                              </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g32"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="768" fill="#d0d0d0">9. Cool on baking sheets for 2 minutes; remove to wire racks to cool completely.                </text><text x="784" textLength="496" class="foreground">                                                              </text></g><g id="g33"><text x="0" textLength="216" fill="#af8787">  &#128220; &#8593;/&#8595; scroll   &#127968; h home</text><text x="216" textLength="24" class="foreground">   </text><text x="240" textLength="64" fill="#af8787">&#9999; e edit</text><text x="304" textLength="24" class="foreground">   </text><text x="328" textLength="88" fill="#af8787">&#128190; p export</text><text x="416" textLength="24" class="foreground">   </text><text x="440" textLength="64" fill="#af8787">&#10133; a add</text><text x="504" textLength="24" class="foreground">   </text><text x="528" textLength="80" fill="#af8787">&#128465; d delete</text><text x="608" textLength="496" class="foreground">                                                              </text><text x="1104" textLength="152" fill="#5f5f5f">enplace 1.0.3-alpha</text><text x="1256" textLength="24" class="foreground">   </text></g></defs><g><use xlink:href="#g1" y="0"/><use xlink:href="#g2" y="17"/><use xlink:href="#g1" y="34"/><use xlink:href="#g3" y="51"/><use xlink:href="#g1" y="68"/><use xlink:href="#g4" y="85"/><use xlink:href="#g5" y="102"/><rect x="0" y="119" width="72" height="17" fill="#d7875f"/><rect x="80" y="119" width="48" height="17" fill="#87af87"/><rect x="136" y="119" width="80" height="17" fill="#8787af"/><use xlink:href="#g6" y="119"/><use xlink:href="#g1" y="136"/><rect x="0" y="153" width="792" height="17" fill="#afaf87"/><use xlink:href="#g7" y="153"/><rect x="0" y="170" width="784" height="17" fill="#afaf87"/><use xlink:href="#g8" y="170"/><rect x="0" y="187" width="104" height="17" fill="#afaf87"/><use xlink:href="#g9" y="187"/><use xlink:href="#g1" y="204"/><use xlink:href="#g1" y="221"/><use xlink:href="#g10" y="238"/><use xlink:href="#g11" y="255"/><use xlink:href="#g12" y="272"/><use xlink:href="#g13" y="289"/><use xlink:href="#g14" y="306"/><use xlink:href="#g15" y="323"/><use xlink:href="#g16" y="340"/><use xlink:href="#g17" y="357"/><use xlink:href="#g18" y="374"/><use xlink:href="#g19" y="391"/><use xlink:href="#g20" y="408"/><use xlink:href="#g1" y="425"/><use xlink:href="#g1" y="4